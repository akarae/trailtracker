<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Race Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #eee;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    header {
      background: #16213e; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 2px solid #0f3460; flex-shrink: 0; z-index: 200;
    }
    header h1 { font-size: 15px; font-weight: 700; color: #e94560; white-space: nowrap; }
    .badge { background: #0f3460; padding: 3px 9px; border-radius: 12px; font-size: 11px; color: #aaa; cursor: pointer; user-select: none; }
    .badge:active { background: #1a4a7a; }
    .fb-status { font-size: 11px; margin-left: auto; white-space: nowrap; }
    .status-ok   { color: #2ecc71; }
    .status-err  { color: #e94560; }
    .status-wait { color: #aaa; }
    .menu-btn {
      display: none; align-items: center; justify-content: center;
      background: #0f3460; border: none; color: #eee;
      width: 32px; height: 32px; border-radius: 6px; font-size: 18px; cursor: pointer; flex-shrink: 0;
    }

    .main { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── 사이드바 ── */
    .sidebar {
      width: 268px; background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex; flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* 사이드바 상단 고정 영역 */
    .sidebar-top { overflow-y: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; }

    /* 참가자 목록 영역 — 남은 공간 차지 + 스크롤 */
    .sidebar-members {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      border-top: 1px solid #0f3460;
    }
    .sidebar-members .section-title {
      padding: 10px 12px 6px;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: #e94560; font-weight: 700;
      flex-shrink: 0;
    }
    .member-list {
      flex: 1;
      height: 0;           /* flex 스크롤 핵심 트릭 */
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 0 12px 10px;
      display: flex; flex-direction: column; gap: 5px;
    }
    /* 스크롤바 스타일 */
    .member-list::-webkit-scrollbar { width: 4px; }
    .member-list::-webkit-scrollbar-track { background: transparent; }
    .member-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    @media (max-width: 620px) {
      .menu-btn { display: flex !important; }
      .sidebar {
        position: absolute; top: 0; left: 0; height: 100%;
        z-index: 150; transform: translateX(-100%);
        transition: transform .25s; width: 82vw; max-width: 300px;
      }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.6); }
      #customScale { left: 10px; }
    }
    .overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,.5); z-index: 140;
      pointer-events: none;
    }

    .section { padding: 12px 12px 10px; border-bottom: 1px solid #0f3460; }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #e94560; margin-bottom: 8px; font-weight: 700; }

    label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; }
    input[type="text"], input[type="number"] {
      width: 100%; background: #0f3460; border: 1px solid #1a4a8a;
      border-radius: 6px; color: #eee; padding: 7px 10px;
      font-size: 13px; margin-bottom: 7px; outline: none;
    }
    input:focus { border-color: #e94560; }
    input:disabled { opacity: .5; }

    /* 2열 그리드 */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    /* 색상 선택 버튼 + 팝업 */
    .color-pick-btn {
      width: 100%; padding: 7px 8px; border: 1px solid #1a4a8a;
      border-radius: 6px; background: #0f3460; color: #eee;
      font-size: 12px; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 6px;
    }
    .color-preview {
      width: 14px; height: 14px; border-radius: 50%;
      flex-shrink: 0; border: 2px solid rgba(255,255,255,.4);
    }
    .color-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .color-swatch {
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent; transition: transform .15s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #fff; transform: scale(1.2); }

    .btn { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .2s; margin-top: 4px; }
    .btn:hover { opacity: .85; }
    .btn-primary   { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #ddd; border: 1px solid #1a4a8a; }
    .btn-red       { background: #c0392b; color: #fff; }

    .file-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 8px 4px;
      background: #0f3460; border: 1px dashed #1a4a8a;
      border-radius: 6px; color: #aaa; font-size: 11px;
      text-align: center; cursor: pointer;
    }
    .file-btn:hover { border-color: #e94560; color: #e94560; }
    #gpxInput { display: none; }

    /* 지도 위 타입 오버레이 */
    .map-type-overlay {
      position: absolute; top: 10px; right: 10px; z-index: 400;
      display: flex; gap: 4px;
    }
    .mto-btn {
      background: rgba(22,33,62,.92); border: 1px solid #0f3460;
      color: #aaa; padding: 5px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      backdrop-filter: blur(2px);
    }
    .mto-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    .mto-loc { font-size: 15px; }

    /* 커스텀 축척 */
    #customScale {
      position: absolute; bottom: 14px; left: calc(268px + 10px); z-index: 5;
      display: flex; flex-direction: column; align-items: flex-start;
      pointer-events: none;
    }
    #customScaleBar {
      height: 4px; background: #fff;
      border: 1px solid rgba(0,0,0,.5);
      border-top: none;
    }
    #customScaleLabel {
      font-size: 10px; color: #fff;
      text-shadow: 0 0 3px #000, 0 0 3px #000;
      margin-top: 2px;
    }

    .my-badge {
      background: #0d2b0d; border: 1px solid #2ecc71;
      border-radius: 6px; padding: 6px 10px;
      font-size: 11px; color: #2ecc71; margin-top: 6px; display: none;
    }

    .refresh-row { display: flex; gap: 4px; align-items: center; }
    .refresh-row input { margin-bottom: 0; flex: 1; }
    #countdown { font-size: 11px; color: #f39c12; margin-top: 2px; min-height: 16px; }

    .member-item {
      display: flex; align-items: center; gap: 7px;
      background: #0f3460; border-radius: 6px;
      padding: 7px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0;
    }
    .member-item:hover { background: #1a4a8a; }
    .member-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .member-name { flex: 1; }
    .member-me   { font-size: 10px; color: #2ecc71; }
    .member-time { font-size: 10px; color: #555; }
    .member-remove { cursor: pointer; color: #555; font-size: 16px; line-height: 1; }
    .member-remove:hover { color: #e94560; }
    .no-members  { font-size: 12px; color: #555; padding: 4px 0; }

    #map { flex: 1; z-index: 1; }

    #toast {
      position: fixed;
      top: 30%; left: 50%; transform: translateX(-50%);
      background: #16213e; border: 2px solid #e94560;
      color: #eee; padding: 14px 22px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      z-index: 9999; opacity: 0;
      pointer-events: none; transition: opacity .3s;
      max-width: 80vw; line-height: 1.7;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,.7);
    }
    #toast.show { opacity: 1; }

    .custom-marker {
      display: flex; align-items: center; justify-content: center;
      border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
      border: 2px solid rgba(255,255,255,.75);
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .custom-marker span {
      transform: rotate(45deg);
      font-size: 11px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,.8);
    }
  </style>
</head>
<body>

<header>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>🏃 Trail Tracker <span style="font-size:10px;color:#aaa;font-weight:400">v0.09</span></h1>
  <span class="badge" id="memberCount" onclick="resetMembers()">0명</span>
  <span class="fb-status status-wait" id="fbStatus">⚪ 연결 중</span>
</header>

<div class="main">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">

    <div class="sidebar-top">

      <!-- GPX: 배타적 표시 -->
      <div class="section">
        <label for="gpxInput" class="file-btn" id="gpxLabel">📂 GPX 파일 업로드</label>
        <button class="btn btn-secondary" id="deleteGpxBtn" style="display:none;margin-top:0" onclick="deleteGPX()">🗑 경로 삭제</button>
        <input type="file" id="gpxInput" accept=".gpx" onchange="uploadGPX(event)" />
      </div>

      <!-- 이름 | 색상 -->
      <div class="section">
        <div class="grid2">
          <input type="text" id="nameInput" placeholder="이름을 입력해 주세요" maxlength="8" style="margin-bottom:0" />
          <button class="color-pick-btn" id="colorPickBtn" onclick="toggleColorPopup(event)">
            <span class="color-preview" id="colorPreview" style="background:#e94560"></span>
            색상 선택
          </button>
        </div>
        <!-- 색상 스와치: 버튼 클릭 시 인라인으로 펼쳐짐 -->
        <div class="color-row" id="colorRow" style="display:none; margin-top:8px; padding-top:8px; border-top:1px solid #0f3460;"></div>
        <div class="my-badge" id="myBadge"></div>
      </div>

      <!-- 공유 시작 | 갱신 주기 -->
      <div class="section">
        <div class="grid2" style="align-items:center">
          <div>
            <button class="btn btn-primary" id="joinBtn" onclick="joinRace()" style="margin-top:0">📌 공유 시작</button>
            <button class="btn btn-red" id="leaveBtn" onclick="leaveRace()" style="display:none;margin-top:0">⛔ 공유 종료</button>
          </div>
          <div class="refresh-row" style="justify-content:flex-end">
            <input type="number" id="refreshSec" value="5" min="1" max="60" style="margin-bottom:0;width:60px;flex:none;text-align:center" />
            <span style="font-size:11px;color:#aaa;white-space:nowrap">초</span>
          </div>
        </div>
        <div id="countdown" style="font-size:10px;color:#f39c12;margin-top:4px;min-height:14px;text-align:right"></div>
      </div>

    </div><!-- /sidebar-top -->

    <!-- 참가자 목록 -->
    <div class="sidebar-members">
      <div class="section-title">🏅 참가자 목록</div>
      <div class="member-list" id="memberList">
        <div class="no-members">참가자 없음</div>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- 지도 위 버튼 오버레이 -->
  <div class="map-type-overlay">
    <div class="mto-btn active" onclick="setMapType('street')">일반</div>
    <div class="mto-btn" onclick="setMapType('satellite')">위성</div>
    <div class="mto-btn" onclick="setMapType('topo')">지형</div>
    <div class="mto-btn mto-loc" onclick="goToMyLocation()" title="현재 위치">📍</div>
  </div>


  <div id="map"></div>

  <!-- 커스텀 축척 -->
  <div id="customScale">
    <div id="customScaleBar" style="width:80px"></div>
    <div id="customScaleLabel">-</div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── Firebase ── */
firebase.initializeApp({
  apiKey: "AIzaSyDMHoRvQUmCWaLj63odfs1zEml24iJV9Bc",
  authDomain: "trailtracker-bf956.firebaseapp.com",
  databaseURL: "https://trailtracker-bf956-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "trailtracker-bf956",
  storageBucket: "trailtracker-bf956.firebasestorage.app",
  messagingSenderId: "227255453355",
  appId: "1:227255453355:web:8c0262d4e1ec0f686a99ee"
});
const db = firebase.database();

db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('fbStatus');
  el.textContent = snap.val() ? '🟢 연결됨' : '🔴 연결 끊김';
  el.className = 'fb-status ' + (snap.val() ? 'status-ok' : 'status-err');
});

/* ── 지도 ── */
const map = L.map('map', { touchZoom: true, tap: false })
             .setView([35.8714, 128.6014], 12);

const tiles = {
  street:    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',     { attribution:'© OSM', maxZoom:19 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:19 }),
  topo:      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',       { attribution:'© OpenTopoMap', maxZoom:17 })
};
tiles.street.addTo(map);
let currentTile = 'street';

// 커스텀 축척
function updateScale() {
  const zoom = map.getZoom();
  const lat  = map.getCenter().lat;
  const mpp  = 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
  const targetPx = 80;
  const meters   = mpp * targetPx;

  let label, barPx;
  if (meters >= 1000) {
    const km = Math.round(meters / 1000 * 10) / 10;
    label = `${km} km`;
    barPx = (km * 1000) / mpp;
  } else {
    const m = Math.round(meters / 10) * 10 || 1;
    label = `${m} m`;
    barPx = m / mpp;
  }
  document.getElementById('customScaleBar').style.width = Math.round(barPx) + 'px';
  document.getElementById('customScaleLabel').textContent = label;
}
map.on('zoomend moveend', updateScale);
updateScale();

function setMapType(type) {
  map.removeLayer(tiles[currentTile]);
  tiles[type].addTo(map);
  currentTile = type;
  document.querySelectorAll('.mto-btn').forEach((b,i) =>
    b.classList.toggle('active', ['street','satellite','topo'][i] === type));
}

/* ── 색상 선택 토글 ── */
function toggleColorPopup(e) {
  e.stopPropagation();
  const row = document.getElementById('colorRow');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}
document.addEventListener('click', () => {
  document.getElementById('colorRow').style.display = 'none';
});

/* ── 색상 ── */
const COLORS = ['#e94560','#f39c12','#2ecc71','#3498db','#9b59b6','#1abc9c','#e67e22','#e91e63','#00bcd4','#ff5722'];
let selectedColor = COLORS[0];

document.getElementById('colorRow').innerHTML = COLORS.map((c,i) =>
  `<div class="color-swatch${i===0?' selected':''}" style="background:${c}" data-color="${c}" onclick="pickColor('${c}',this)"></div>`
).join('');

function pickColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('colorPreview').style.background = c;
  document.getElementById('colorRow').style.display = 'none';
}

/* ── UUID 발급 (기기 식별자) ── */
function getOrCreateUUID() {
  let uuid = localStorage.getItem('trackerUUID');
  if (!uuid) {
    uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
    localStorage.setItem('trackerUUID', uuid);
  }
  return uuid;
}
const myUUID = getOrCreateUUID();

/* ── 참가자 상태 ── */
let myName = null, myWatchId = null, countdownTimer = null;
const markers = {};
let lastData = {};

// 페이지 로드 시 localStorage에 세션 정보가 있으면 자동 재연결
window.addEventListener('load', () => {
  const savedName  = localStorage.getItem('trackerName');
  const savedColor = localStorage.getItem('trackerColor');
  if (!savedName) return;

  // 색상 복원
  if (savedColor) {
    selectedColor = savedColor;
    document.getElementById('colorPreview').style.background = savedColor;
    document.querySelectorAll('.color-swatch').forEach(s => {
      s.classList.toggle('selected', s.dataset.color === savedColor);
    });
  }

  // 이름 복원 후 자동 재연결
  document.getElementById('nameInput').value = savedName;
  showToast(`🔄 ${savedName} 세션을 복원 중입니다...`);
  requestGPS(savedName);
});

// 화면 다시 켜지면 위치 갱신
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && myName) {
    navigator.geolocation.getCurrentPosition(pos => {
      db.ref(`members/${myUUID}`).set({
        name: myName, lat: pos.coords.latitude,
        lng: pos.coords.longitude, color: selectedColor,
        initial: myName[0].toUpperCase(), updatedAt: Date.now()
      });
    }, null, { enableHighAccuracy: true, timeout: 10000 });
  }
});

// 참가자 전체 강제 리셋 (타이틀 뱃지 클릭 시 호출)
function resetMembers() {
  if (!confirm('참가자를 초기화하시겠습니까?\n\n현재 등록된 모든 참가자 정보가 삭제됩니다.')) return;
  // 내 공유 상태 먼저 정리 (GPS, 타이머, UI, localStorage 모두 처리)
  if (myName) leaveRace(true);
  // Firebase 전체 삭제
  db.ref('members').remove()
    .then(() => alert('참가자 정보가 초기화되었습니다.'))
    .catch(err => alert('초기화 실패: ' + err.message));
}


function createIcon(color, initial, name) {
  const label = initial || (name ? name[0].toUpperCase() : '?');
  return L.divIcon({
    className: '',
    html: `<div class="custom-marker" style="background:${color||'#888'};width:30px;height:30px;"><span>${label}</span></div>`,
    iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-34]
  });
}

/* ── 위치 공유 시작 ── */
function joinRace() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('이름을 입력해 주세요'); return; }
  if (myName) { showToast(`이미 '${myName}'로 공유 중입니다`); return; }
  if (!navigator.geolocation) { showToast('GPS를 사용할 수 없습니다'); return; }

  if (navigator.permissions) {
    navigator.permissions.query({ name: 'geolocation' }).then(r => {
      if (r.state === 'denied') {
        showToast('⚠️ GPS가 차단되어 있습니다\n주소창 자물쇠 → 위치 → 허용 후 다시 시도해 주세요', 5000);
        return;
      }
      requestGPS(name);
    });
  } else {
    requestGPS(name);
  }
}

function requestGPS(name) {
  showToast('📡 GPS 위치 확인 중입니다...');
  navigator.geolocation.getCurrentPosition(pos => {
    myName = name;
    localStorage.setItem('trackerName', name);
    localStorage.setItem('trackerColor', selectedColor);
    // Firebase 키: UUID (이름 아님)
    db.ref(`members/${myUUID}`).set({
      name, lat: pos.coords.latitude, lng: pos.coords.longitude,
      color: selectedColor, initial: name[0].toUpperCase(), updatedAt: Date.now()
    });
    startWatch();
    startCountdown();
    document.getElementById('nameInput').disabled = true;
    document.getElementById('joinBtn').style.display = 'none';
    document.getElementById('leaveBtn').style.display = 'block';
    document.getElementById('myBadge').textContent = `📍 ${name} 위치 공유 중`;
    document.getElementById('myBadge').style.display = 'block';
    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
    showToast(`✅ ${name} 위치 공유가 시작되었습니다`);
  },
  () => { showToast('⚠️ GPS 권한이 거부되었습니다\n주소창 자물쇠 → 위치 → 허용 후 다시 시도해 주세요', 5000); },
  { enableHighAccuracy: true, timeout: 10000 });
}

function startWatch() {
  if (myWatchId !== null) navigator.geolocation.clearWatch(myWatchId);
  myWatchId = navigator.geolocation.watchPosition(pos => {
    if (!myName) return;
    db.ref(`members/${myUUID}`).set({
      name: myName, lat: pos.coords.latitude, lng: pos.coords.longitude,
      color: selectedColor, initial: myName[0].toUpperCase(), updatedAt: Date.now()
    });
  }, null, { enableHighAccuracy: true, maximumAge: 10000 });
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  let sec = parseInt(document.getElementById('refreshSec').value) || 5;
  let remain = sec;
  countdownTimer = setInterval(() => {
    remain--;
    document.getElementById('countdown').textContent = `다음 강제 갱신 ${remain}초 후`;
    if (remain <= 0) {
      remain = sec;
      if (myName) navigator.geolocation.getCurrentPosition(pos => {
        db.ref(`members/${myUUID}`).set({
          name: myName, lat: pos.coords.latitude, lng: pos.coords.longitude,
          color: selectedColor, initial: myName[0].toUpperCase(), updatedAt: Date.now()
        });
      }, null, { enableHighAccuracy: true });
    }
  }, 1000);
}

function leaveRace(silent = false) {
  if (!myName) return;
  db.ref(`members/${myUUID}`).remove();
  if (myWatchId !== null) { navigator.geolocation.clearWatch(myWatchId); myWatchId = null; }
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  document.getElementById('countdown').textContent = '';
  document.getElementById('nameInput').disabled = false;
  document.getElementById('joinBtn').style.display = 'block';
  document.getElementById('leaveBtn').style.display = 'none';
  document.getElementById('myBadge').style.display = 'none';
  localStorage.removeItem('trackerName');
  localStorage.removeItem('trackerColor');
  if (!silent) showToast(`${myName} 위치 공유가 종료되었습니다`);
  myName = null;
}

/* ── Firebase 실시간 수신 ── */
db.ref('members').on('value', snap => {
  lastData = snap.val() || {};
  // 사라진 마커 제거
  Object.keys(markers).forEach(uuid => { if (!lastData[uuid]) { map.removeLayer(markers[uuid]); delete markers[uuid]; } });
  // 마커 추가/갱신 (키=UUID, 표시명=m.name)
  Object.entries(lastData).forEach(([uuid, m]) => {
    const displayName = m.name || uuid;
    if (markers[uuid]) {
      markers[uuid].setLatLng([m.lat, m.lng]);
      markers[uuid].setPopupContent(makePopup(displayName, m));
    } else {
      markers[uuid] = L.marker([m.lat, m.lng], { icon: createIcon(m.color, m.initial, displayName) })
        .addTo(map).bindPopup(makePopup(displayName, m));
    }
  });
  document.getElementById('memberCount').textContent = `${Object.keys(lastData).length}명`;
  renderList();
});

setInterval(renderList, 5000);

// 내 노드가 외부(참가자 초기화 등)에 의해 삭제되면 자동으로 공유 종료
db.ref(`members/${myUUID}`).on('value', snap => {
  if (!snap.val() && myName) {
    leaveRace(true);
    showToast('⚠️ 참가자가 초기화되어 위치 공유가 종료되었습니다.', 4000);
  }
});

function makePopup(name, m) {
  const sec = Math.round((Date.now() - m.updatedAt) / 1000);
  const ago = sec < 60 ? `${sec}초 전` : `${Math.floor(sec/60)}분 전`;
  return `<b style="color:${m.color}">${name}</b><br>위도 ${m.lat.toFixed(5)}<br>경도 ${m.lng.toFixed(5)}<br><small>🕐 ${ago} 갱신</small>`;
}

function renderList() {
  const list = document.getElementById('memberList');
  const entries = Object.entries(lastData);
  if (!entries.length) { list.innerHTML = '<div class="no-members">참가자 없음</div>'; return; }
  list.innerHTML = entries.map(([uuid, m]) => {
    const sec = Math.round((Date.now() - m.updatedAt) / 1000);
    const ago = sec < 60 ? `${sec}초 전` : `${Math.floor(sec/60)}분 전`;
    const isMe = uuid === myUUID;
    const displayName = m.name || uuid;
    return `<div class="member-item" onclick="focusMember(${m.lat},${m.lng})">
      <div class="member-dot" style="background:${m.color}"></div>
      <div class="member-name">${displayName}</div>
      ${isMe ? '<span class="member-me">나</span>' : ''}
      <div class="member-time">${ago}</div>
      ${isMe ? `<div class="member-remove" onclick="event.stopPropagation();leaveRace()">×</div>` : ''}
    </div>`;
  }).join('');
}

function focusMember(lat, lng) { map.flyTo([lat, lng], 15); closeSidebar(); }

/* ── 현재 위치 이동 ── */
let myLocMarker = null;
function goToMyLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    if (myLocMarker) map.removeLayer(myLocMarker);
    myLocMarker = L.circleMarker([lat, lng], {
      radius: 8, color: '#fff', weight: 2,
      fillColor: '#3498db', fillOpacity: 0.9
    }).addTo(map).bindPopup('📍 현재 위치').openPopup();
    map.flyTo([lat, lng], 15);
  }, () => showToast('현재 위치를 가져올 수 없습니다'), { enableHighAccuracy: true, timeout: 8000 });
}

/* ── GPX ── */
let gpxLine = null, gpxS = null, gpxE = null;

function uploadGPX(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const doc = new DOMParser().parseFromString(e.target.result, 'application/xml');
    const pts = [...doc.querySelectorAll('trkpt,rtept')].map(p => ({
      lat: parseFloat(p.getAttribute('lat')), lng: parseFloat(p.getAttribute('lon'))
    })).filter(p => !isNaN(p.lat));
    if (!pts.length) { showToast('GPX 좌표를 찾을 수 없습니다'); return; }
    db.ref('route').set({ points: pts, name: file.name, uploadedAt: Date.now() });
    showToast(`✅ ${file.name} 공유 완료 (${pts.length}개 좌표)`);
    document.getElementById('gpxInput').value = '';
  };
  reader.readAsText(file);
}

function deleteGPX() { db.ref('route').remove(); showToast('경로가 삭제되었습니다'); }

function setGpxUI(hasRoute) {
  document.getElementById('gpxLabel').style.display    = hasRoute ? 'none'  : 'flex';
  document.getElementById('deleteGpxBtn').style.display = hasRoute ? 'block' : 'none';
}

db.ref('route').on('value', snap => {
  if (gpxLine) { map.removeLayer(gpxLine); gpxLine = null; }
  if (gpxS)    { map.removeLayer(gpxS);    gpxS = null; }
  if (gpxE)    { map.removeLayer(gpxE);    gpxE = null; }
  const data = snap.val();
  if (!data?.points?.length) { setGpxUI(false); return; }
  const ll = data.points.map(p => [p.lat, p.lng]);
  gpxLine = L.polyline(ll, { color:'#f39c12', weight:3, opacity:.9 }).addTo(map);
  const mk = html => L.divIcon({ className:'', iconSize:[16,16], iconAnchor:[8,8], html });
  gpxS = L.marker(ll[0], { icon: mk('<div style="background:#2ecc71;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid #fff">S</div>') }).addTo(map).bindPopup('🏁 출발');
  gpxE = L.marker(ll[ll.length-1], { icon: mk('<div style="background:#e94560;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid #fff">F</div>') }).addTo(map).bindPopup('🏆 도착');
  setGpxUI(true);
  map.fitBounds(gpxLine.getBounds(), { padding:[30,30] });
});

/* ── 사이드바 ── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar'), ov = document.getElementById('overlay');
  const isOpen = sb.classList.toggle('open');
  if (isOpen) {
    ov.style.display = 'block';
    ov.style.pointerEvents = 'auto';
  } else {
    closeSidebar();
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  const ov = document.getElementById('overlay');
  ov.style.display = 'none';
  ov.style.pointerEvents = 'none';
  // 사이드바 닫힌 후 지도 터치/크기 재활성화
  setTimeout(() => map.invalidateSize(), 300);
}
map.on('click', closeSidebar);


/* ── 토스트 ── */
let toastTimer;
function showToast(msg, duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}
</script>
</body>
</html>
