<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Race Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #eee;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── 로비 ── */
    .lobby-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
    }
    .lobby-box {
      width: 88%; max-width: 340px;
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 16px; padding: 28px 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .lobby-title { font-size: 22px; font-weight: 700; color: #e94560; text-align: center; }
    .lobby-ver   { font-size: 10px; color: #555; text-align: center; margin-top: -6px; }
    .lobby-sub   { font-size: 12px; color: #888; text-align: center; margin-bottom: 4px; }
    .lobby-divider {
      text-align: center; font-size: 11px; color: #444;
      position: relative; margin: 4px 0;
    }
    .lobby-divider::before, .lobby-divider::after {
      content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: #0f3460;
    }
    .lobby-divider::before { left: 0; }
    .lobby-divider::after  { right: 0; }

    header {
      background: #16213e; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 2px solid #0f3460; flex-shrink: 0; z-index: 200;
    }
    header h1 { font-size: 15px; font-weight: 700; color: #e94560; white-space: nowrap; }
    .badge { background: #0f3460; padding: 3px 9px; border-radius: 12px; font-size: 11px; color: #aaa; cursor: pointer; user-select: none; }
    .badge:active { background: #1a4a7a; }
    .group-badge { background: #0f3460; padding: 3px 9px; border-radius: 12px; font-size: 11px; color: #f39c12; font-weight: 700; letter-spacing: 2px; }
    .fb-status { font-size: 11px; margin-left: auto; white-space: nowrap; }
    .status-ok   { color: #2ecc71; }
    .status-err  { color: #e94560; }
    .status-wait { color: #aaa; }
    .menu-btn {
      display: none; align-items: center; justify-content: center;
      background: #0f3460; border: none; color: #eee;
      width: 32px; height: 32px; border-radius: 6px; font-size: 18px; cursor: pointer; flex-shrink: 0;
    }

    .main { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── 사이드바 ── */
    .sidebar {
      width: 268px; background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
    }
    .sidebar-top { overflow-y: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
    .sidebar-members {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      border-top: 1px solid #0f3460;
    }
    .sidebar-members .section-title {
      padding: 10px 12px 6px;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: #e94560; font-weight: 700; flex-shrink: 0;
    }
    .member-list {
      flex: 1; height: 0;
      overflow-y: scroll; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 0 12px 10px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .member-list::-webkit-scrollbar { width: 4px; }
    .member-list::-webkit-scrollbar-track { background: transparent; }
    .member-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    @media (max-width: 620px) {
      .menu-btn { display: flex !important; }
      .sidebar {
        position: absolute; top: 0; left: 0; height: 100%;
        z-index: 150; transform: translateX(-100%);
        transition: transform .25s; width: 82vw; max-width: 300px;
      }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.6); }
      #customScale { left: 10px; }
      #elevPanel { left: 0; }
    }
    .overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,.5); z-index: 140; pointer-events: none;
    }
    body.sidebar-open .map-type-overlay { z-index: 100; }

    .section { padding: 12px 12px 10px; border-bottom: 1px solid #0f3460; }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #e94560; margin-bottom: 8px; font-weight: 700; }

    /* 그룹 정보 섹션 */
    .group-code-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .group-code {
      background: #0f3460; padding: 4px 10px; border-radius: 6px;
      font-size: 15px; letter-spacing: 4px; color: #f39c12; font-weight: 700;
    }

    label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; }
    input[type="text"], input[type="number"] {
      width: 100%; background: #0f3460; border: 1px solid #1a4a8a;
      border-radius: 6px; color: #eee; padding: 7px 10px;
      font-size: 13px; margin-bottom: 7px; outline: none;
    }
    input:focus { border-color: #e94560; }
    input:disabled { opacity: .5; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .color-pick-btn {
      width: 100%; padding: 7px 8px; border: 1px solid #1a4a8a;
      border-radius: 6px; background: #0f3460; color: #eee;
      font-size: 12px; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 6px;
    }
    .color-preview {
      width: 14px; height: 14px; border-radius: 50%;
      flex-shrink: 0; border: 2px solid rgba(255,255,255,.4);
    }
    .color-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .color-swatch {
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent; transition: transform .15s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #fff; transform: scale(1.2); }

    .btn { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .2s; margin-top: 4px; }
    .btn:hover { opacity: .85; }
    .btn-primary   { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #ddd; border: 1px solid #1a4a8a; }
    .btn-red       { background: #c0392b; color: #fff; }

    .file-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 8px 4px;
      background: #0f3460; border: 1px dashed #1a4a8a;
      border-radius: 6px; color: #aaa; font-size: 11px;
      text-align: center; cursor: pointer;
    }
    .file-btn:hover { border-color: #e94560; color: #e94560; }
    #gpxInput { display: none; }

    .map-type-overlay {
      position: absolute; top: 10px; right: 10px; z-index: 400;
      display: flex; gap: 4px;
    }
    .mto-btn {
      background: rgba(22,33,62,.92); border: 1px solid #0f3460;
      color: #aaa; padding: 5px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      backdrop-filter: blur(2px);
    }
    .mto-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    .mto-loc { font-size: 15px; }

    /* 고도 프로필 패널 */
    #elevPanel {
      display: none; position: absolute;
      top: 0; left: 268px; right: 0; height: 190px;
      z-index: 200; background: rgba(14,22,46,.97);
      border-bottom: 2px solid #0f3460;
      flex-direction: column; padding: 6px 12px 8px;
    }
    #elevPanel.show { display: flex; }
    #elevHeader {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: #aaa; flex-shrink: 0; margin-bottom: 4px;
    }
    #elevHeader .elev-close {
      background: none; border: none; color: #aaa; cursor: pointer;
      font-size: 15px; line-height: 1; padding: 0 2px;
    }
    #elevCanvas { flex: 1; min-height: 0; }

    /* 커스텀 축척 */
    #customScale {
      position: absolute; bottom: 14px; left: calc(268px + 10px); z-index: 5;
      display: flex; flex-direction: column; align-items: flex-start;
      pointer-events: none;
    }
    #customScaleBar { height: 4px; background: #fff; border: 1px solid rgba(0,0,0,.5); border-top: none; }
    #customScaleLabel { font-size: 10px; color: #fff; text-shadow: 0 0 3px #000, 0 0 3px #000; margin-top: 2px; }

    .my-badge {
      background: #0d2b0d; border: 1px solid #2ecc71;
      border-radius: 6px; padding: 6px 10px;
      font-size: 11px; color: #2ecc71; margin-top: 6px; display: none;
    }

    .refresh-row { display: flex; gap: 4px; align-items: center; }
    .refresh-row input { margin-bottom: 0; flex: 1; }
    #countdown { font-size: 11px; color: #f39c12; margin-top: 2px; min-height: 16px; }

    .member-item {
      display: flex; align-items: center; gap: 7px;
      background: #0f3460; border-radius: 6px;
      padding: 7px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0;
    }
    .member-item:hover { background: #1a4a8a; }
    .member-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .member-name { flex: 1; }
    .member-me   { font-size: 10px; color: #2ecc71; }
    .member-time { font-size: 10px; color: #555; }
    .member-remove { cursor: pointer; color: #555; font-size: 16px; line-height: 1; }
    .member-remove:hover { color: #e94560; }
    .no-members  { font-size: 12px; color: #555; padding: 4px 0; }

    #map { flex: 1; z-index: 1; }

    #toast {
      position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
      background: #16213e; border: 2px solid #e94560;
      color: #eee; padding: 14px 22px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      z-index: 9999; opacity: 0; pointer-events: none; transition: opacity .3s;
      max-width: 80vw; line-height: 1.7; text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,.7);
    }
    #toast.show { opacity: 1; }

    .custom-marker {
      display: flex; align-items: center; justify-content: center;
      border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
      border: 2px solid rgba(255,255,255,.75);
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .custom-marker span {
      transform: rotate(45deg);
      font-size: 11px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,.8);
    }
  </style>
</head>
<body>

<!-- ── 로비 ── -->
<div id="lobby" class="lobby-overlay">
  <div class="lobby-box">
    <div class="lobby-title">🏃 Trail Tracker</div>
    <div class="lobby-ver">v0.15</div>
    <div class="lobby-sub">그룹을 만들거나 초대 코드로 참가하세요</div>
    <input type="text" id="groupNameInput" placeholder="그룹 이름 (예: 수성20K 팀A)" maxlength="20" />
    <button class="btn btn-primary" onclick="createGroup()" style="margin-top:0">✚ 그룹 만들기</button>
    <div class="lobby-divider">또는</div>
    <input type="text" id="groupCodeInput" placeholder="초대 코드 6자리" maxlength="6"
      style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:16px;font-weight:700;margin-bottom:0"
      oninput="this.value=this.value.toUpperCase()" />
    <button class="btn btn-secondary" onclick="joinGroupByCode()" style="margin-top:6px">→ 그룹 참가</button>
  </div>
</div>

<header>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>🏃 Trail Tracker <span style="font-size:10px;color:#aaa;font-weight:400">v0.15</span></h1>
  <span class="badge" id="memberCount" onclick="resetMembers()">0명</span>
  <span class="group-badge" id="groupBadge" style="display:none"></span>
  <span class="fb-status status-wait" id="fbStatus">⚪ 연결 중</span>
</header>

<div class="main">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">

      <!-- 그룹 정보 -->
      <div class="section" id="groupInfoSection" style="display:none">
        <div class="section-title">🏷 그룹 정보</div>
        <div style="font-size:12px;color:#eee;margin-bottom:6px" id="groupNameDisplay"></div>
        <div class="group-code-row">
          <span class="group-code" id="groupCodeDisplay"></span>
          <button class="btn btn-secondary" style="margin-top:0;width:auto;padding:4px 8px;font-size:11px" onclick="copyGroupUrl()">🔗 초대 링크</button>
        </div>
        <button class="btn btn-red" style="margin-top:0;font-size:11px;padding:6px" onclick="deleteGroup()">🗑 그룹 종료</button>
      </div>

      <!-- GPX -->
      <div class="section">
        <label for="gpxInput" class="file-btn" id="gpxLabel">📂 GPX 파일 업로드</label>
        <button class="btn btn-secondary" id="deleteGpxBtn" style="display:none;margin-top:0" onclick="deleteGPX()">🗑 경로 삭제</button>
        <input type="file" id="gpxInput" accept=".gpx" onchange="uploadGPX(event)" />
      </div>

      <!-- 이름 | 색상 -->
      <div class="section">
        <div class="grid2">
          <input type="text" id="nameInput" placeholder="이름을 입력해 주세요" maxlength="8" style="margin-bottom:0" />
          <button class="color-pick-btn" id="colorPickBtn" onclick="toggleColorPopup(event)">
            <span class="color-preview" id="colorPreview" style="background:#ff1744"></span>
            색상 선택
          </button>
        </div>
        <div class="color-row" id="colorRow" style="display:none; margin-top:8px; padding-top:8px; border-top:1px solid #0f3460;"></div>
        <div class="my-badge" id="myBadge"></div>
      </div>

      <!-- 공유 시작 | 갱신 주기 -->
      <div class="section">
        <div class="grid2" style="align-items:center">
          <div>
            <button class="btn btn-primary" id="joinBtn" onclick="joinRace()" style="margin-top:0">📌 공유 시작</button>
            <button class="btn btn-red" id="leaveBtn" onclick="leaveRace()" style="display:none;margin-top:0">⛔ 공유 종료</button>
          </div>
          <div class="refresh-row" style="justify-content:flex-end">
            <input type="number" id="refreshSec" value="3" min="1" max="60" style="margin-bottom:0;width:60px;flex:none;text-align:center" />
            <span style="font-size:11px;color:#aaa;white-space:nowrap">초</span>
          </div>
        </div>
        <div id="countdown" style="font-size:10px;color:#f39c12;margin-top:4px;min-height:14px;text-align:right"></div>
      </div>

    </div><!-- /sidebar-top -->

    <!-- 참가자 목록 -->
    <div class="sidebar-members">
      <div class="section-title">🏅 참가자 목록</div>
      <div class="member-list" id="memberList">
        <div class="no-members">참가자 없음</div>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- 지도 위 버튼 오버레이 -->
  <div class="map-type-overlay">
    <div class="mto-btn" id="elevBtn" onclick="toggleElevation()" title="고도 프로필">📈</div>
    <div class="mto-btn active" data-map="street" onclick="setMapType('street')">일반</div>
    <div class="mto-btn" data-map="satellite" onclick="setMapType('satellite')">위성</div>
    <div class="mto-btn" data-map="topo" onclick="setMapType('topo')">지형</div>
    <div class="mto-btn mto-loc" onclick="goToMyLocation()" title="현재 위치">📍</div>
  </div>

  <!-- 고도 프로필 패널 -->
  <div id="elevPanel">
    <div id="elevHeader">
      <span>📈 고도 프로필</span>
      <button class="elev-close" onclick="toggleElevation()">✕</button>
    </div>
    <canvas id="elevCanvas"></canvas>
  </div>

  <div id="map"></div>

  <!-- 커스텀 축척 -->
  <div id="customScale">
    <div id="customScaleBar" style="width:80px"></div>
    <div id="customScaleLabel">-</div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── Firebase ── */
firebase.initializeApp({
  apiKey: "AIzaSyDMHoRvQUmCWaLj63odfs1zEml24iJV9Bc",
  authDomain: "trailtracker-bf956.firebaseapp.com",
  databaseURL: "https://trailtracker-bf956-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "trailtracker-bf956",
  storageBucket: "trailtracker-bf956.firebasestorage.app",
  messagingSenderId: "227255453355",
  appId: "1:227255453355:web:8c0262d4e1ec0f686a99ee"
});
const db = firebase.database();

db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('fbStatus');
  el.textContent = snap.val() ? '🟢 연결됨' : '🔴 연결 끊김';
  el.className = 'fb-status ' + (snap.val() ? 'status-ok' : 'status-err');
});

/* ── 지도 ── */
const map = L.map('map', { touchZoom: true, tap: false })
             .setView([35.8714, 128.6014], 12);

const tiles = {
  street:    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',     { attribution:'© OSM', maxZoom:19 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:19 }),
  topo:      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',       { attribution:'© OpenTopoMap', maxZoom:17 })
};
tiles.street.addTo(map);
let currentTile = 'street';

/* ── 경로 거리 데이터 ── */
let gpxRoutePoints = [], gpxCumDist = [], gpxTotalDist = 0;
let elevChart = null, elevVisible = false;

function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function buildRouteData(points) {
  gpxRoutePoints = points;
  gpxCumDist = [0];
  for (let i = 1; i < points.length; i++) {
    gpxCumDist.push(gpxCumDist[i-1] + haversineDistance(
      points[i-1].lat, points[i-1].lng, points[i].lat, points[i].lng));
  }
  gpxTotalDist = gpxCumDist[gpxCumDist.length - 1] || 0;
}

function findRoutePosition(lat, lng) {
  if (!gpxRoutePoints.length || !gpxTotalDist) return null;
  let minDist = Infinity, minIdx = 0;
  for (let i = 0; i < gpxRoutePoints.length; i++) {
    const d = haversineDistance(lat, lng, gpxRoutePoints[i].lat, gpxRoutePoints[i].lng);
    if (d < minDist) { minDist = d; minIdx = i; }
  }
  return {
    distFromStart: Math.round(gpxCumDist[minIdx]),
    distRemaining: Math.round(gpxTotalDist - gpxCumDist[minIdx]),
    progress: (gpxCumDist[minIdx] / gpxTotalDist * 100).toFixed(1),
    ele: gpxRoutePoints[minIdx].ele || 0
  };
}

function toggleElevation() {
  if (!gpxRoutePoints.length) { showToast('GPX 파일을 먼저 업로드해 주세요'); return; }
  elevVisible = !elevVisible;
  document.getElementById('elevPanel').classList.toggle('show', elevVisible);
  document.getElementById('elevBtn').classList.toggle('active', elevVisible);
  if (elevVisible) renderElevationChart();
  else if (elevChart) { elevChart.destroy(); elevChart = null; }
}

function renderElevationChart() {
  if (!elevVisible || !gpxRoutePoints.length) return;
  const canvas = document.getElementById('elevCanvas');
  if (elevChart) { elevChart.destroy(); elevChart = null; }
  const hasEle = gpxRoutePoints.some(p => (p.ele || 0) > 0);
  const profileData = gpxRoutePoints.map((p, i) =>
    ({ x: Math.round(gpxCumDist[i]), y: hasEle ? (p.ele || 0) : 0 }));
  const participantDatasets = Object.entries(lastData).map(([uuid, m]) => {
    const pos = findRoutePosition(m.lat, m.lng);
    if (!pos) return null;
    return {
      type: 'scatter', label: m.name || uuid,
      data: [{ x: pos.distFromStart, y: hasEle ? pos.ele : 0 }],
      backgroundColor: m.color, borderColor: '#fff', borderWidth: 2,
      pointRadius: 8, pointHoverRadius: 10, order: 0
    };
  }).filter(Boolean);
  elevChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      datasets: [
        { label: '고도', data: profileData, borderColor: '#f39c12',
          backgroundColor: 'rgba(243,156,18,0.15)', fill: true,
          tension: 0.3, pointRadius: 0, order: 1 },
        ...participantDatasets
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => `${(items[0].parsed.x/1000).toFixed(2)} km`,
            label: item => item.dataset.label === '고도'
              ? `고도: ${item.parsed.y}m`
              : `${item.dataset.label} — ${(item.parsed.x/1000).toFixed(2)}km`
          }
        }
      },
      scales: {
        x: { type: 'linear', min: 0, max: Math.round(gpxTotalDist),
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#888', maxTicksLimit: 5, callback: v => `${(v/1000).toFixed(1)}km` } },
        y: { display: hasEle, grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#888', maxTicksLimit: 4, callback: v => `${v}m` } }
      }
    }
  });
}

function updateElevationMarkers() { if (elevVisible) renderElevationChart(); }

// 커스텀 축척
function updateScale() {
  const zoom = map.getZoom(), lat = map.getCenter().lat;
  const mpp  = 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
  const meters = mpp * 80;
  let label, barPx;
  if (meters >= 1000) {
    const km = Math.round(meters / 1000 * 10) / 10;
    label = `${km} km`; barPx = (km * 1000) / mpp;
  } else {
    const m = Math.round(meters / 10) * 10 || 1;
    label = `${m} m`; barPx = m / mpp;
  }
  document.getElementById('customScaleBar').style.width = Math.round(barPx) + 'px';
  document.getElementById('customScaleLabel').textContent = label;
}
map.on('zoomend moveend', updateScale);
updateScale();

function setMapType(type) {
  map.removeLayer(tiles[currentTile]);
  tiles[type].addTo(map);
  currentTile = type;
  document.querySelectorAll('.mto-btn[data-map]').forEach(b =>
    b.classList.toggle('active', b.dataset.map === type));
}

/* ── 색상 선택 ── */
function toggleColorPopup(e) {

document.addEventListener('click', () => {

const COLORS = [
  '#ff1744', '#c62828',  // 빨
  '#ff9100', '#e65100',  // 주
  '#ffea00', '#f57f17',  // 노
  '#00e676', '#4caf50',  // 초

let selectedColor = COLORS[0];

document.getElementById('colorRow').innerHTML = COLORS.map((c,i) =>

/* ── UUID ── */
function getOrCreateUUID() {
  let uuid = localStorage.getItem('trackerUUID');
  if (!uuid) {
    uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
    localStorage.setItem('trackerUUID', uuid);
  }
  return uuid;
}
const myUUID = getOrCreateUUID();

/* ── 그룹 관리 ── */
let currentGroupId = null, currentGroupName = null;

function groupRef(path) {
  return path ? db.ref(`groups/${currentGroupId}/${path}`) : db.ref(`groups/${currentGroupId}`);
}

function generateGroupId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

async function createGroup() {
  const name = document.getElementById('groupNameInput').value.trim();
  if (!name) { showToast('그룹 이름을 입력해 주세요'); return; }

  const snap = await db.ref('groups').once('value');
  const groups = snap.val() || {};
  if (Object.keys(groups).length >= 10) {
    showToast('⚠️ 최대 그룹 수(10개)에 도달했습니다', 4000); return;
  }

  const groupId = generateGroupId();
  await db.ref(`groups/${groupId}/info`).set({
    name, createdAt: Date.now(), creatorUUID: myUUID
  });
  enterGroup(groupId, name);
}

async function joinGroupByCode() {
  const code = document.getElementById('groupCodeInput').value.trim().toUpperCase();
  if (code.length < 4) { showToast('올바른 코드를 입력해 주세요'); return; }

  const snap = await db.ref(`groups/${code}/info`).once('value');
  if (!snap.val()) { showToast('⚠️ 존재하지 않는 그룹입니다', 3000); return; }

  enterGroup(code, snap.val().name);
}

function enterGroup(groupId, groupName) {
  currentGroupId = groupId;
  currentGroupName = groupName;
  history.replaceState(null, '', `?group=${groupId}`);

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('groupInfoSection').style.display = 'block';
  document.getElementById('groupNameDisplay').textContent = groupName;
  document.getElementById('groupCodeDisplay').textContent = groupId;
  document.getElementById('groupBadge').textContent = groupId;
  document.getElementById('groupBadge').style.display = 'inline-block';

  startGroupListeners();
}

function exitToLobby() {
  if (myName) leaveRace(true);
  currentGroupId = null; currentGroupName = null;
  lastData = {};
  Object.keys(markers).forEach(uuid => { map.removeLayer(markers[uuid]); delete markers[uuid]; });
  gpxRoutePoints = []; gpxCumDist = []; gpxTotalDist = 0;
  if (gpxLine) { map.removeLayer(gpxLine); gpxLine = null; }
  if (gpxS) { map.removeLayer(gpxS); gpxS = null; }
  if (gpxE) { map.removeLayer(gpxE); gpxE = null; }
  if (elevVisible) { elevVisible = false; document.getElementById('elevPanel').classList.remove('show'); if (elevChart) { elevChart.destroy(); elevChart = null; } }
  history.replaceState(null, '', location.pathname);
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('groupInfoSection').style.display = 'none';
  document.getElementById('groupBadge').style.display = 'none';
  document.getElementById('memberCount').textContent = '0명';
  setGpxUI(false);
  renderList();
}

function deleteGroup() {
  if (!confirm('그룹을 종료하시겠습니까?\n모든 참가자가 퇴장됩니다.')) return;
  if (myName) leaveRace(true);
  groupRef().remove()
    .then(() => exitToLobby())
    .catch(err => showToast('그룹 종료 실패: ' + err.message));
}

function copyGroupUrl() {
  const url = `${location.origin}${location.pathname}?group=${currentGroupId}`;
  navigator.clipboard.writeText(url)
    .then(() => showToast('✅ 초대 링크가 복사되었습니다'))
    .catch(() => showToast('링크: ' + url, 5000));
}

function startGroupListeners() {
  // 참가자 목록
  groupRef('members').on('value', snap => {
    lastData = snap.val() || {};
    Object.keys(markers).forEach(uuid => {
      if (!lastData[uuid]) { map.removeLayer(markers[uuid]); delete markers[uuid]; }
    });
    Object.entries(lastData).forEach(([uuid, m]) => {
      const displayName = m.name || uuid;
      if (markers[uuid]) {
        markers[uuid].setLatLng([m.lat, m.lng]);
        markers[uuid].setPopupContent(makePopup(displayName, m));
      } else {
        markers[uuid] = L.marker([m.lat, m.lng], { icon: createIcon(m.color, m.initial, displayName) })
          .addTo(map).bindPopup(makePopup(displayName, m));
      }
    });
    document.getElementById('memberCount').textContent = `${Object.keys(lastData).length}명`;
    renderList();
    updateElevationMarkers();
  });

  // 내 노드 삭제 감지
  groupRef(`members/${myUUID}`).on('value', snap => {
    if (!snap.val() && myName) {
      leaveRace(true);
      showToast('⚠️ 참가자가 초기화되어 위치 공유가 종료되었습니다.', 4000);
    }
  });

  // 그룹 삭제 감지
  groupRef('info').on('value', snap => {
    if (!snap.val() && currentGroupId) {
      showToast('⚠️ 그룹이 종료되었습니다.', 4000);
      exitToLobby();
    }
  });

  // 경로
  groupRef('route').on('value', snap => {
    if (gpxLine) { map.removeLayer(gpxLine); gpxLine = null; }
    if (gpxS)    { map.removeLayer(gpxS);    gpxS = null; }
    if (gpxE)    { map.removeLayer(gpxE);    gpxE = null; }
    const data = snap.val();
    if (!data?.points?.length) {
      setGpxUI(false);
      gpxRoutePoints = []; gpxCumDist = []; gpxTotalDist = 0;
      if (elevVisible) toggleElevation();
      return;
    }
    buildRouteData(data.points);
    const ll = data.points.map(p => [p.lat, p.lng]);
    gpxLine = L.polyline(ll, { color:'#f39c12', weight:3, opacity:.9 }).addTo(map);
    const mk = html => L.divIcon({ className:'', iconSize:[16,16], iconAnchor:[8,8], html });
    gpxS = L.marker(ll[0], { icon: mk('<div style="background:#2ecc71;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid #fff">S</div>') }).addTo(map).bindPopup('🏁 출발');
    gpxE = L.marker(ll[ll.length-1], { icon: mk('<div style="background:#e94560;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid #fff">F</div>') }).addTo(map).bindPopup('🏆 도착');
    setGpxUI(true);
    map.fitBounds(gpxLine.getBounds(), { padding:[30,30] });
  });
}

/* ── 참가자 상태 ── */
let myName = null, myWatchId = null, countdownTimer = null;
const markers = {};
let lastData = {};

/* ── 페이지 로드 ── */
window.addEventListener('load', () => {
  const urlGroupId = new URLSearchParams(location.search).get('group');
  if (urlGroupId) {
    // URL에 그룹 코드가 있으면 자동 입장 시도
    db.ref(`groups/${urlGroupId}/info`).once('value').then(snap => {
      if (!snap.val()) {
        showToast('⚠️ 해당 그룹을 찾을 수 없습니다', 3000);
        history.replaceState(null, '', location.pathname);
        return;
      }
      enterGroup(urlGroupId, snap.val().name);

      // 이전 세션 복원
      const savedName  = localStorage.getItem('trackerName');
      const savedColor = localStorage.getItem('trackerColor');
      if (!savedName) return;
      if (savedColor) {
        selectedColor = savedColor;
        document.getElementById('colorPreview').style.background = savedColor;
        document.querySelectorAll('.color-swatch').forEach(s =>
          s.classList.toggle('selected', s.dataset.color === savedColor));
      }
      document.getElementById('nameInput').value = savedName;
      showToast(`🔄 ${savedName} 세션을 복원 중입니다...`);
      requestGPS(savedName);
    });
  }
  // URL에 그룹 없으면 로비를 그대로 표시 (기본 상태)
});

// 화면 다시 켜지면 위치 갱신
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && myName && currentGroupId) {
    navigator.geolocation.getCurrentPosition(pos => {
      groupRef(`members/${myUUID}`).set({
        name: myName, lat: pos.coords.latitude,
        lng: pos.coords.longitude, color: selectedColor,
        initial: myName[0].toUpperCase(), updatedAt: Date.now()
      });
    }, null, { enableHighAccuracy: true, timeout: 10000 });
  }
});

// 참가자 전체 리셋
function resetMembers() {
  if (!currentGroupId) return;
  if (!confirm('참가자를 초기화하시겠습니까?\n\n현재 등록된 모든 참가자 정보가 삭제됩니다.')) return;
  if (myName) leaveRace(true);
  groupRef('members').remove()
    .then(() => alert('참가자 정보가 초기화되었습니다.'))
    .catch(err => alert('초기화 실패: ' + err.message));
}

function createIcon(color, initial, name) {
  const label = initial || (name ? name[0].toUpperCase() : '?');
  return L.divIcon({
    className: '',
    html: `<div class="custom-marker" style="background:${color||'#888'};width:30px;height:30px;"><span>${label}</span></div>`,
    iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-34]
  });
}

/* ── 위치 공유 ── */
async function joinRace() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('이름을 입력해 주세요'); return; }
  if (!currentGroupId) { showToast('먼저 그룹에 참가해 주세요'); return; }
  if (myName) { showToast(`이미 '${myName}'로 공유 중입니다`); return; }
  if (!navigator.geolocation) { showToast('GPS를 사용할 수 없습니다'); return; }

  // 8명 제한 확인
  const snap = await groupRef('members').once('value');
  const members = snap.val() || {};
  if (Object.keys(members).length >= 8 && !members[myUUID]) {
    showToast('⚠️ 위치 공유 인원이 가득 찼습니다 (최대 8명)', 4000); return;
  }

  if (navigator.permissions) {
    navigator.permissions.query({ name: 'geolocation' }).then(r => {
      if (r.state === 'denied') {
        showToast('⚠️ GPS가 차단되어 있습니다\n주소창 자물쇠 → 위치 → 허용 후 다시 시도해 주세요', 5000);
        return;
      }
      requestGPS(name);
    });
  } else {
    requestGPS(name);
  }
}

function requestGPS(name) {
  showToast('📡 GPS 위치 확인 중입니다...');
  navigator.geolocation.getCurrentPosition(pos => {
    myName = name;
    localStorage.setItem('trackerName', name);
    localStorage.setItem('trackerColor', selectedColor);
    groupRef(`members/${myUUID}`).set({
      name, lat: pos.coords.latitude, lng: pos.coords.longitude,
      color: selectedColor, initial: name[0].toUpperCase(), updatedAt: Date.now()
    });
    startWatch();
    startCountdown();
    document.getElementById('nameInput').disabled = true;
    document.getElementById('joinBtn').style.display = 'none';
    document.getElementById('leaveBtn').style.display = 'block';
    document.getElementById('myBadge').textContent = `📍 ${name} 위치 공유 중`;
    document.getElementById('myBadge').style.display = 'block';
    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
    showToast('✅ 위치 공유가 시작되었습니다');
  },
  () => { showToast('⚠️ GPS 권한이 거부되었습니다\n주소창 자물쇠 → 위치 → 허용 후 다시 시도해 주세요', 5000); },
  { enableHighAccuracy: true, timeout: 10000 });
}

function startWatch() {
  if (myWatchId !== null) navigator.geolocation.clearWatch(myWatchId);
  myWatchId = navigator.geolocation.watchPosition(pos => {
    if (!myName || !currentGroupId) return;
    groupRef(`members/${myUUID}`).set({
      name: myName, lat: pos.coords.latitude, lng: pos.coords.longitude,
      color: selectedColor, initial: myName[0].toUpperCase(), updatedAt: Date.now()
    });
  }, null, { enableHighAccuracy: true, maximumAge: 10000 });
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  let sec = parseInt(document.getElementById('refreshSec').value) || 3;
  let remain = sec;
  countdownTimer = setInterval(() => {
    remain--;
    document.getElementById('countdown').textContent = `다음 강제 갱신 ${remain}초 후`;
    if (remain <= 0) {
      remain = sec;
      if (myName && currentGroupId) navigator.geolocation.getCurrentPosition(pos => {
        groupRef(`members/${myUUID}`).set({
          name: myName, lat: pos.coords.latitude, lng: pos.coords.longitude,
          color: selectedColor, initial: myName[0].toUpperCase(), updatedAt: Date.now()
        });
      }, null, { enableHighAccuracy: true });
    }
  }, 1000);
}

function leaveRace(silent = false) {
  if (!myName) return;
  if (currentGroupId) groupRef(`members/${myUUID}`).remove();
  if (myWatchId !== null) { navigator.geolocation.clearWatch(myWatchId); myWatchId = null; }
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  document.getElementById('countdown').textContent = '';
  document.getElementById('nameInput').disabled = false;
  document.getElementById('joinBtn').style.display = 'block';
  document.getElementById('leaveBtn').style.display = 'none';
  document.getElementById('myBadge').style.display = 'none';
  localStorage.removeItem('trackerName');
  localStorage.removeItem('trackerColor');
  if (!silent) showToast('위치 공유가 종료되었습니다');
  myName = null;
}

setInterval(renderList, 5000);

function makePopup(name, m) {
  const sec = Math.round((Date.now() - m.updatedAt) / 1000);
  const ago = sec < 60 ? `${sec}초 전` : `${Math.floor(sec/60)}분 전`;
  let routeHtml = '';
  if (gpxTotalDist > 0) {
    const pos = findRoutePosition(m.lat, m.lng);
    if (pos) {
      routeHtml =
        `<hr style="border:none;border-top:1px solid #444;margin:4px 0">` +
        `<small>` +
        `📏 총거리 ${Math.round(gpxTotalDist).toLocaleString()}m<br>` +
        `📍 현재 ${pos.distFromStart.toLocaleString()}m (${pos.progress}%)<br>` +
        `🏁 남은거리 ${pos.distRemaining.toLocaleString()}m` +
        `</small>`;
    }
  }
  return `<b style="color:${m.color}">${name}</b><br>위도 ${m.lat.toFixed(5)}<br>경도 ${m.lng.toFixed(5)}<br><small>🕐 ${ago} 갱신</small>${routeHtml}`;
}

function renderList() {
  const list = document.getElementById('memberList');
  const entries = Object.entries(lastData);
  if (!entries.length) { list.innerHTML = '<div class="no-members">참가자 없음</div>'; return; }
  list.innerHTML = entries.map(([uuid, m]) => {
    const sec = Math.round((Date.now() - m.updatedAt) / 1000);
    const ago = sec < 60 ? `${sec}초 전` : `${Math.floor(sec/60)}분 전`;
    const isMe = uuid === myUUID;
    const displayName = m.name || uuid;
    return `<div class="member-item" onclick="focusMember(${m.lat},${m.lng})">
      <div class="member-dot" style="background:${m.color}"></div>
      <div class="member-name">${displayName}</div>
      ${isMe ? '<span class="member-me">나</span>' : ''}
      <div class="member-time">${ago}</div>
      ${isMe ? `<div class="member-remove" onclick="event.stopPropagation();leaveRace()">×</div>` : ''}
    </div>`;
  }).join('');
}

function focusMember(lat, lng) { map.flyTo([lat, lng], 15); closeSidebar(); }

/* ── 현재 위치 ── */
let myLocMarker = null;
function goToMyLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    if (myLocMarker) map.removeLayer(myLocMarker);
    myLocMarker = L.circleMarker([lat, lng], {
      radius: 8, color: '#fff', weight: 2,
      fillColor: '#3498db', fillOpacity: 0.9
    }).addTo(map).bindPopup('📍 현재 위치').openPopup();
    map.flyTo([lat, lng], 15);
  }, () => showToast('현재 위치를 가져올 수 없습니다'), { enableHighAccuracy: true, timeout: 8000 });
}

/* ── GPX ── */
let gpxLine = null, gpxS = null, gpxE = null;

function uploadGPX(event) {
  if (!currentGroupId) { showToast('먼저 그룹에 참가해 주세요'); return; }
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const doc = new DOMParser().parseFromString(e.target.result, 'application/xml');
    const pts = [...doc.querySelectorAll('trkpt,rtept')].map(p => ({
      lat: parseFloat(p.getAttribute('lat')),
      lng: parseFloat(p.getAttribute('lon')),
      ele: parseFloat(p.querySelector('ele')?.textContent) || 0
    })).filter(p => !isNaN(p.lat));
    if (!pts.length) { showToast('GPX 좌표를 찾을 수 없습니다'); return; }
    groupRef('route').set({ points: pts, name: file.name, uploadedAt: Date.now() });
    showToast(`✅ ${file.name} 공유 완료 (${pts.length}개 좌표)`);
    document.getElementById('gpxInput').value = '';
  };
  reader.readAsText(file);
}

function deleteGPX() {
  if (currentGroupId) groupRef('route').remove();
  showToast('경로가 삭제되었습니다');
}

function setGpxUI(hasRoute) {
  document.getElementById('gpxLabel').style.display     = hasRoute ? 'none'  : 'flex';
  document.getElementById('deleteGpxBtn').style.display = hasRoute ? 'block' : 'none';
}

/* ── 사이드바 ── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar'), ov = document.getElementById('overlay');
  const isOpen = sb.classList.toggle('open');
  if (isOpen) {
    ov.style.display = 'block'; ov.style.pointerEvents = 'auto';
    document.body.classList.add('sidebar-open');
  } else {
    closeSidebar();
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.body.classList.remove('sidebar-open');
  const ov = document.getElementById('overlay');
  ov.style.display = 'none'; ov.style.pointerEvents = 'none';
  setTimeout(() => map.invalidateSize(), 300);
}
map.on('click', closeSidebar);

/* ── 토스트 ── */
let toastTimer;
function showToast(msg, duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}
</script>
